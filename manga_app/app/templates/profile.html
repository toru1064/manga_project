<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プロフィール</title>
</head>
<body>
    <h1>{{ user.username }}さんのプロフィール</h1>

    {% if user.profile_image %}
        <img src="{{ url_for('static', filename='profile_images/' + user.profile_image) }}" alt="プロフィール画像" width="150">
    {% else %}
        <p>プロフィール画像は未設定です</p>
    {% endif %}
    <p><strong>表示名:</strong> {{ user.display_name or '未設定' }}</p>
    <p><strong>自己紹介:</strong> {{ user.bio or '未設定' }}</p>

    {% if current_user.id == user.id %}
        <a href="{{ url_for('main.edit_profile') }}">プロフィールを編集する</a><br>
    {% endif %}
    <a href="{{ url_for('main.index') }}">ホームに戻る</a>
</body>
</html>
