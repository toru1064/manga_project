<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>いいねランキング</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-4 mb-5">
        <h1 class="mb-4">人気投稿ランキング</h1>

        <p>
            <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">ホームに戻る</a>
        </p>

        {% for book in books %}
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ loop.index }}位</h5>
                    <p class="mb-1">投稿者：{{ book.user.display_name or book.user.username }}</p>
                    <p class="mb-1">タイトル：{{ book.title }}</p>
                    <p class="mb-1">感想：{{ book.review }}</p>
                    <p class="mb-1">評価：{{ book.rating }} / 5</p>
                    <p class="mb-0">いいね数：{{ book.likes.count() }}</p>
                </div>
            </div>
        {% endfor %}
    </div>

</body>
</html>
