<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プロフィール編集</title>
</head>
<body>
    <h1>プロフィールを編集</h1>

    <form method="POST" enctype="multipart/form-data">
        <p>表示名: <input type="text" name="display_name" value="{{ current_user.display_name or '' }}"></p>
        <p>自己紹介: <textarea name="bio">{{ current_user.bio or '' }}</textarea></p>
        <p>プロフィール画像: <input type="file" name="profile_image"></p>
        <p><input type="submit" value="保存"></p>
    </form>

    <p><a href="{{ url_for('main.profile') }}">プロフィールに戻る</a></p>
</body>
</html>
