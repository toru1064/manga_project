<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プロフィール編集</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5 d-flex justify-content-center">
        <div class="card p-4 shadow" style="width: 500px;">
            <h2 class="text-center mb-4">プロフィール編集</h2>

            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">表示名</label>
                    <input type="text" name="display_name"
                           value="{{ current_user.display_name or '' }}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">自己紹介</label>
                    <textarea name="bio" class="form-control" rows="4">{{ current_user.bio or '' }}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">プロフィール画像</label>
                    <input type="file" name="profile_image" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary w-100">保存</button>
            </form>

            <div class="text-center mt-3">
                <a href="{{ url_for('main.profile') }}">プロフィールに戻る</a>
            </div>
        </div>
    </div>

</body>
</html>
