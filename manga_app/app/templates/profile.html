<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プロフィール</title>

    <!-- 追加 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5 d-flex justify-content-center">
        <div class="card p-4 shadow" style="width: 400px;">

            <h3 class="text-center mb-3">{{ user.username }}さんのプロフィール</h3>

            <!-- プロフィール画像 -->
            <div class="text-center mb-3">
                {% if user.profile_image %}
                    <img src="{{ url_for('static', filename='profile_images/' + user.profile_image) }}"
                         class="rounded-circle"
                         width="120">
                {% else %}
                    <p class="text-muted">画像未設定</p>
                {% endif %}
            </div>

            <!-- 表示名 -->
            <p><strong>表示名：</strong><br>
                {{ user.display_name or "未設定" }}
            </p>

            <!-- 自己紹介 -->
            <p><strong>自己紹介：</strong><br>
                {{ user.bio or "未設定" }}
            </p>

            <!-- ボタン -->
            <div class="d-grid gap-2 mt-3">
                {% if current_user.id == user.id %}
                    <a href="{{ url_for('main.edit_profile') }}" class="btn btn-primary">プロフィール編集</a>
                {% endif %}

                <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">ホームに戻る</a>
            </div>

        </div>
    </div>

</body>
</html>
