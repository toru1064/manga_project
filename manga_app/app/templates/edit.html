<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>投稿編集</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5 d-flex justify-content-center">
        <div class="card p-4 shadow" style="width: 600px;">
            <h2 class="text-center mb-4">投稿の編集</h2>

            <form method="POST" action="{{ url_for('main.update', id=book.id) }}">
                <div class="mb-3">
                    <label class="form-label">タイトル</label>
                    <input type="text" name="title" value="{{ book.title }}" required class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">感想</label>
                    <textarea name="review" required class="form-control" rows="5">{{ book.review }}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">評価（1〜5）</label>
                    <input type="number" name="rating" min="1" max="5" value="{{ book.rating }}" required class="form-control">
                </div>

                <button type="submit" class="btn btn-success w-100">更新</button>
            </form>
        </div>
    </div>

</body>
</html>
